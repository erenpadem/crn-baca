services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crn-app
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-crn_baca}
      - DB_USERNAME=${DB_USERNAME:-crn}
      - DB_PASSWORD=${DB_PASSWORD:-crn_secret}
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "8000:8000"
    networks:
      - crn-network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: crn-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crn_baca}
      MYSQL_USER: ${DB_USERNAME:-crn}
      MYSQL_PASSWORD: ${DB_PASSWORD:-crn_secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-crn_secret}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - crn-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  crn-network:
    driver: bridge

volumes:
  mysql-data:
